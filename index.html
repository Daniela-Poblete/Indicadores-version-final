<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Bibliotecas Duoc UC</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- SheetJS — Excel (.xlsx) parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Firebase SDK (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- App data + cloud sync (plain JS — must load before Babel scripts) -->
  <script src="js/data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/parsers.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F2F2F2;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --yellow:  #F5A800;
      --teal:    #1EBEC8;
      --blue:    #2E86C1;
      --green:   #27AE60;
      --orange:  #E67E22;
      --dark:    #1a1a1a;
    }

    /* Scrollbar */
    ::-webkit-scrollbar               { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track         { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb         { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover   { background: #bbb; }

    /* Nav scrollbar hidden */
    nav ::-webkit-scrollbar { display: none; }

    button { font-family: inherit; }
    select { font-family: inherit; }

    /* Smooth page transitions */
    #root > div { animation: fadeIn 0.18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="56" fill="#1a1a1a"/>
      <rect x="0" y="0" width="80" height="8" fill="#F5A800"/>
      <rect x="8" y="14" width="30" height="4" rx="1" fill="#F5A800" opacity=".9"/>
      <rect x="8" y="20" width="20" height="2" rx="1" fill="#888"/>
      <rect x="8" y="26" width="64" height="14" rx="1" fill="#2C2C2C"/>
      <rect x="12" y="30" width="12" height="6" rx="1" fill="#F5A800" opacity=".7"/>
      <rect x="28" y="30" width="12" height="6" rx="1" fill="#1EBEC8" opacity=".7"/>
      <rect x="44" y="30" width="12" height="6" rx="1" fill="#2E86C1" opacity=".7"/>
      <text x="8" y="51" font-family="sans-serif" font-size="5" fill="#888">Duoc UC · Bibliotecas</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <!-- Components loaded in dependency order -->
  <script type="text/babel" src="js/components/Charts.jsx"></script>
  <script type="text/babel" src="js/components/Sections.jsx"></script>
  <script type="text/babel" src="js/components/Compare.jsx"></script>
  <script type="text/babel" src="js/components/App.jsx"></script>
</body>
</html>
